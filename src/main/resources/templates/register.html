<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Register - Hashiji Cafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-size: 14px;
        }

        .register-form {
            width: 100%;
            max-width: 500px;
            padding: 15px;
            margin: auto;
        }
    </style>
</head>

<body class="text-center">
    <main class="register-form">
        <form th:action="@{/register}" method="post" th:object="${user}">
            <h1 class="h3 mb-3 fw-normal">Create Account</h1>

            <div th:if="${param.error}" class="alert alert-danger">
                Registration failed. Please try again.
            </div>

            <div class="mb-3 text-start">
                <label for="username" class="form-label fw-bold">Username</label>
                <input type="text" class="form-control form-control-lg" id="username" th:field="*{username}"
                    placeholder="Enter username" required>
                <div class="text-danger small" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="mb-3 text-start">
                <label for="password" class="form-label fw-bold">Password</label>
                <input type="password" class="form-control form-control-lg" id="password" th:field="*{password}"
                    placeholder="Enter password" required minlength="4">
                <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="mb-3 text-start">
                <label for="confirmPassword" class="form-label fw-bold">Confirm Password</label>
                <input type="password" class="form-control form-control-lg" id="confirmPassword" name="confirmPassword"
                    placeholder="Confirm password" required>
            </div>

            <div class="mb-3 text-start">
                <label for="fullName" class="form-label fw-bold">Full Name</label>
                <input type="text" class="form-control form-control-lg" id="fullName" th:field="*{fullName}"
                    placeholder="Enter full name">
            </div>

            <div class="mb-3 text-start">
                <label for="email" class="form-label fw-bold">Email</label>
                <input type="email" class="form-control form-control-lg" id="email" th:field="*{email}"
                    placeholder="Enter email">
            </div>

            <div class="mb-3 text-start">
                <label for="phone" class="form-label fw-bold">Phone</label>
                <input type="tel" class="form-control form-control-lg" id="phone" th:field="*{phone}"
                    placeholder="Enter phone number" pattern="0[35789][0-9]{8}">
            </div>

            <button class="w-100 btn btn-lg btn-primary" type="submit">Register</button>

            <p class="mt-3">Already have an account? <a href="/login">Sign in here</a></p>
            <p class="mt-2 mb-3 text-muted">&copy; 2026</p>
        </form>
    </main>
</body>

</html>
