<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content})}">

<head>
    <title>My Orders - Hashiji Cafe</title>
</head>

<body>
    <div th:fragment="content" class="container py-5 mt-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold" style="color: var(--primary);">My Orders</h2>
            <p class="text-muted">View your order history and track current orders.</p>
        </div>

        <div th:if="${success}" class="alert alert-success rounded-3" role="alert">
            <i class="fas fa-check-circle me-2"></i> <span th:text="${success}"></span>
        </div>

        <div th:if="${orders.isEmpty()}" class="text-center py-5">
            <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
            <h4 class="text-muted">No orders yet</h4>
            <p class="text-muted">Start ordering from our <a href="/#menu">menu</a>!</p>
        </div>

        <div th:unless="${orders.isEmpty()}" class="table-responsive">
            <table class="table table-hover">
                <thead class="bg-light">
                    <tr>
                        <th>Order Code</th>
                        <th>Date</th>
                        <th>Items</th>
                        <th class="text-end">Total</th>
                        <th class="text-center">Status</th>
                        <th class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td class="fw-bold" th:text="${order.trackingCode}">ORD-000001</td>
                        <td th:text="${#temporals.format(order.createdAt, 'dd-MM-yyyy HH:mm')}">01-01-2026</td>
                        <td>
                            <span th:each="item, iter : ${order.orderDetails}">
                                <span th:text="${item.snapshotProductName}"></span>
                                <span th:if="${iter.count < order.orderDetails.size()}">, </span>
                            </span>
                        </td>
                        <td class="text-end fw-bold"
                            th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                            100,000 đ</td>
                        <td class="text-center">
                            <span class="badge rounded-pill px-3 py-2"
                                th:classappend="${order.status.name() == 'COMPLETED' ? 'bg-success' : (order.status.name() == 'CANCELLED' ? 'bg-danger' : (order.status.name() == 'PENDING' ? 'bg-warning text-dark' : 'bg-primary'))}"
                                th:text="${order.status}">PENDING</span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/tracking/search(code=${order.trackingCode})}"
                                class="btn btn-sm btn-outline-primary rounded-pill">
                                <i class="fas fa-eye me-1"></i> Track
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div th:if="${totalPages > 1}" class="d-flex justify-content-center mt-4">
            <nav>
                <ul class="pagination">
                    <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/my-orders(page=${currentPage - 1})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage ? 'active' : ''}">
                        <a class="page-link" th:href="@{/my-orders(page=${i})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/my-orders(page=${currentPage + 1})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</body>

</html>
